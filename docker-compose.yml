services:
  postgres:
    image: postgres:16-alpine
    container_name: medmkp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medmkp
      POSTGRES_PASSWORD: medmkp
      POSTGRES_DB: medmkp_medusa
    ports:
      - "55432:5432"
    volumes:
      - medmkp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medmkp -d medmkp_medusa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: medmkp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - medmkp-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  medmkp-postgres-data:
  medmkp-redis-data:
